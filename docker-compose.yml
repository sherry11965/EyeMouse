services:
  backend:
    image: golang:1.21-alpine
    working_dir: /app/backend
    volumes:
      - .:/app
    command: go run ./cmd
    ports:
      - "8080:8080"
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend
