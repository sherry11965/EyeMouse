name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build server
        run: go build -o "$RUNNER_TEMP/atown-server-check" ./cmd

      - name: Build Linux executables
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o "$RUNNER_TEMP/atown-server-linux-amd64" ./cmd
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o "$RUNNER_TEMP/atown-server-linux-arm64" ./cmd

      - name: Upload AMD64 executable
        uses: actions/upload-artifact@v5
        with:
          name: atown-server-linux-amd64
          path: ${{ runner.temp }}/atown-server-linux-amd64
          if-no-files-found: error

      - name: Upload ARM64 executable
        uses: actions/upload-artifact@v5
        with:
          name: atown-server-linux-arm64
          path: ${{ runner.temp }}/atown-server-linux-arm64
          if-no-files-found: error

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
